<html lang="en">
<head>

  <meta property="og:description" content="Builder. Operations at Visuanza. Jewelry under Aromazla. Madrid." />
  <meta property="og:type" content="profile" />
  <meta property="og:url" content="https://ivan.es" />
  <meta property="og:locale" content="en_GB" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─── */
    :root {
      --ink:        #0A0A0A;
      --ink-2:      #111111;
      --ink-3:      #15140F;
      --ink-card:   #18171A;
      --bone:       #F5F0E8;
      --bone-soft:  rgba(245, 240, 232, 0.72);
      --bone-faint: rgba(245, 240, 232, 0.42);
      --bone-line:  rgba(245, 240, 232, 0.10);
      --gold:       #C9A84C;
      --gold-soft:  rgba(201, 168, 76, 0.72);

      --f-display: 'Cinzel', 'Trajan Pro', Georgia, serif;
      --f-body:    'Inter', system-ui, sans-serif;
      --f-mono:    'JetBrains Mono', ui-monospace, monospace;

      --ease-out:  cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body { overflow-x: hidden; }
    body {
      background: var(--ink);
      color: var(--bone);
      font-family: var(--f-body);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    img, svg { display: block; max-width: 100%; }
    ::selection { background: var(--gold); color: var(--ink); }

    /* ─── GRAIN — fixed overlay, dithers the radial-gradient ─── */
    /* Noise is served as a static file so no inline data: URI can be mangled by
       caches, minifiers, or CSP rules between dev and the deployed site. */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 90;
      opacity: 0.05;
      background-image: url("assets/noise.svg");
      background-size: 320px 320px;
      mix-blend-mode: screen;
    }

    /* ─── STICKY STACK (mobile default) ─── */
    /* Each panel sticks at top:0 inside .stack. Increasing z-index per panel
       means each subsequent panel slides up over the previous one as you scroll.
       On desktop (≥1024px) the hero + doorway are taken out of this flow and
       laid out horizontally inside .hpanels-track — see horizontal block below. */
    .stack { display: block; }
    .stack .panel {
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      min-height: 100vh;
      min-height: 100dvh;
      z-index: var(--z, 1);
      isolation: isolate;
    }
    /* Default background ensures each non-hero panel covers the panel beneath
       it during the sticky-stack. Hero keeps its own radial-glow gradient. */
    .stack .panel:not(.hero) { background: var(--ink); }
    /* On mobile, the .hpanels wrappers are layout-transparent so the two
       horizontal panels behave as direct children of .stack and stack vertically. */
    @media (max-width: 1023px) {
      .hpanels, .hpanels-track { display: contents; }
    }

    /* ─── HORIZONTAL SCROLL (desktop ≥1024px) ─── */
    @media (min-width: 1024px) {
      /* The gradient lives on the static .hpanels wrapper — it does NOT translate
         with the track. The hero name and the AROMAZLA card slide across one
         continuous canvas, like elements floating in a single section. */
      .hpanels {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(ellipse 60% 70% at 50% 32% in oklab, rgba(50, 42, 28, 0.6) 0%, transparent 70%),
          linear-gradient(180deg in oklab, var(--ink-2) 0%, var(--ink) 100%);
      }
      .hpanels-track {
        display: flex;
        flex-wrap: nowrap;
        height: 100%;
        width: max-content;
        will-change: transform;
      }
      /* Both panels become transparent on desktop so the .hpanels backdrop shows
         through unbroken — no seam between hero and doorway. */
      .hpanels .hero,
      .hpanels .doorways.panel {
        background: transparent;
      }
      .hpanels .hpanel {
        position: relative !important;
        top: auto !important;
        flex: 0 0 100vw;
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        z-index: auto !important;
      }
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 22px clamp(20px, 4vw, 48px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      transition: background 600ms var(--ease-out), backdrop-filter 600ms;
    }
    /* Nav stays fully transparent at all times — no background, no blur, no border on scroll */
    nav.scrolled { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--f-mono);
      font-size: 0.74rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bone-soft);
      padding: 6px 0;
      position: relative;
      transition: color 240ms var(--ease-out);
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: -2px;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 360ms var(--ease-out);
    }
    .nav-links a:hover { color: var(--bone); }
    .nav-links a:hover::after { transform: scaleX(1); }

    /* ─── MOBILE — Latin cross that morphs into X on tap. Gold in every state. ─── */
    .nav-card {
      display: none;
      width: 36px;
      height: 36px;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 4px;
      color: var(--gold);
    }
    .nav-card svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .nav-card line {
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      transform-box: view-box;
      transform-origin: 12px 12px;
      transition: transform 420ms cubic-bezier(0.7, -0.1, 0.3, 1.1);
    }
    /* Open state → symmetric X around the icon center (12,12), arms length ~14.
       Per the spec: vertical's top point lands LEFT, bottom point lands RIGHT
       (top-left → bottom-right diagonal). Horizontal's bottom point lands LEFT,
       top point lands RIGHT (bottom-left → top-right diagonal). Both bars are
       scaled to the same length so the X is balanced.
       Order applies right-to-left:
         vertical  : scaleY(0.7) shortens 20→14, then rotate(-45deg) puts it on TL→BR.
         horizontal: scaleX(1.17) stretches 12→14, translateY(3px) drops to center,
                     rotate(-45deg) puts it on BL→TR. */
    .nav-card.open .cx-v { transform: rotate(-45deg) scaleY(0.7); }
    .nav-card.open .cx-h { transform: rotate(-45deg) translateY(3px) scaleX(1.17); }

    /* Mobile menu sheet — opens when card is flipped */
    .menu-sheet {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 38px;
      padding: 96px 32px 64px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 420ms var(--ease-out), transform 540ms var(--ease-out);
    }
    .menu-sheet.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .menu-sheet a {
      font-family: var(--f-display);
      font-size: clamp(1.7rem, 7vw, 2.4rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--bone);
      text-transform: uppercase;
    }
    .menu-sheet a:hover { color: var(--gold); }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(120px, 18vh, 200px) 24px clamp(60px, 10vh, 120px);
      isolation: isolate;
      /* Mobile: the gradient lives on the panel itself (the wrapper has display:contents). */
      background:
        radial-gradient(ellipse 70% 65% at 50% 28% in oklab, rgba(50, 42, 28, 0.55) 0%, transparent 70%),
        linear-gradient(180deg in oklab, var(--ink-2) 0%, var(--ink) 100%);
    }
    /* Mobile: same backdrop on the doorway so the sticky-stack reads as one canvas */
    .doorways.panel {
      background:
        radial-gradient(ellipse 70% 65% at 50% 28% in oklab, rgba(50, 42, 28, 0.55) 0%, transparent 70%),
        linear-gradient(180deg in oklab, var(--ink-2) 0%, var(--ink) 100%);
    }
    .hero-frame {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* the name plate sits at the top; large negative space below is left as canvas */
    .hero-plate {
      position: relative;
      width: 100%;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .hero-eyebrow {
      font-family: var(--f-mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: '';
      display: block;
      width: 22px; height: 1px;
      background: var(--gold);
    }

    .hero-name {
      width: 100%;
      max-width: 460px;
      height: auto;
      display: block;
    }
    .hero-name svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }
    .hero-name path {
      fill: var(--bone);
      fill-opacity: 0;
      stroke: var(--bone);
      stroke-width: 0.8;
    }

    .hero-tagline {
      font-family: var(--f-mono);
      font-size: clamp(0.78rem, 0.95vw, 0.9rem);
      letter-spacing: 0.42em;
      text-transform: lowercase;
      font-style: italic;
      color: var(--bone-soft);
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
    }

    /* scroll cue — pinned to viewport bottom, hints at the next panel */
    .hero-cue {
      position: absolute;
      left: 50%;
      bottom: clamp(28px, 5vh, 56px);
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--f-mono);
      font-size: 0.62rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--bone-faint);
      opacity: 0;
      pointer-events: none;
    }
    .hero-cue .arrow {
      display: inline-block;
      width: 28px; height: 1px;
      background: var(--bone-line);
      position: relative;
    }
    .hero-cue .arrow::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      width: 6px; height: 6px;
      border-right: 1px solid var(--gold-soft);
      border-bottom: 1px solid var(--gold-soft);
      transform: translateY(-50%) rotate(-45deg);
    }
    @media (max-width: 1023px) {
      .hero-cue { writing-mode: vertical-rl; bottom: clamp(20px, 4vh, 40px); }
      .hero-cue .arrow { width: 1px; height: 28px; }
      .hero-cue .arrow::after {
        right: 50%; top: auto; bottom: 0;
        transform: translateX(50%) rotate(45deg);
      }
    }
    @keyframes cue-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.95; }
    }
    .hero-cue.pulsing { animation: cue-pulse 2.6s ease-in-out infinite; }

    /* ─── DOORWAYS ─── */
    .doorways {
      padding: clamp(60px, 10vw, 132px) clamp(20px, 4vw, 48px);
      background:
        radial-gradient(ellipse 70% 65% at 50% 28% in oklab, rgba(50, 42, 28, 0.55) 0%, transparent 70%),
        linear-gradient(180deg in oklab, var(--ink-2) 0%, var(--ink) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .doorways .door-visual {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Frameless doorway — pendant + wordmark float on the page background.
       No card, no border, no glow rectangle, no contained box. */
    .door-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: clamp(18px, 2.4vw, 32px);
      background: transparent;
      border: 0;
      cursor: pointer;
      transition: transform 600ms var(--ease-out);
    }
    .door-visual-piece {
      display: block;
      height: clamp(200px, 30vh, 300px);
      width: auto;
      max-width: 80%;
      object-fit: contain;
      pointer-events: none;
      transition: filter 600ms var(--ease-out), transform 600ms var(--ease-out);
    }
    /* Desktop (≥1024px) loads sap.webm — real VP9 alpha, no blend mode needed. */
    @media (min-width: 1024px) {
      .door-visual-piece { height: clamp(320px, 46vh, 480px); }
    }
    /* When the MP4 is loaded (no alpha — black matte), JS adds .use-blend so
       `lighten` knocks the matte out against the panel's dark background. Driven
       by JS, not media query, because viewport size alone can't tell us whether
       the renderer supports VP9 alpha (Safari macOS, iPad landscape, "Request
       Desktop Site" all report >=1024 yet can't render VP9 alpha). */
    .door-visual-piece.use-blend { mix-blend-mode: lighten; }
    /* Carved wordmark — same filter recipe as the hero name, baked-in (no animation). */
    .door-visual-mark {
      width: clamp(240px, 34vw, 420px);
      height: auto;
      display: block;
    }
    .door-visual-mark svg { width: 100%; height: auto; overflow: visible; }

    /* Clickability cue — tells visitors the pendant is a door, not just an image. */
    .door-visual-cue {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }
    .door-visual-cue::before {
      content: '';
      width: 26px; height: 1px;
      background: var(--gold-soft);
    }
    .door-visual-cue .glyph { display: inline-block; }

    /* ─── REVEAL ─── */
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 900ms var(--ease-out), transform 900ms var(--ease-out);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-card { display: inline-flex; }
    }
    @media (max-width: 540px) {
      .hero { padding: 96px 18px 90px; }
      .hero-plate { padding: 28px 12px; }
      .hero-frame { gap: 32px; }
      .door { min-height: 320px; padding: 32px 26px; }
    }

    /* ─── FOCUS ─── */
    a:focus-visible, button:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 4px;
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .reveal { opacity: 1; transform: none; }
      .hero-name path { fill-opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <ul class="nav-links">
      <li><a href="aromazla.html">Aromazla</a></li>
      <li><a href="https://visuanza.es" target="_blank" rel="noopener">Visuanza</a></li>
    </ul>

    <!-- mobile cross — morphs to an X on tap -->
    <button class="nav-card" id="navCard" aria-label="Open navigation" aria-expanded="false">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line class="cx-v" x1="12" y1="2" x2="12" y2="22"/>
        <line class="cx-h" x1="6" y1="9" x2="18" y2="9"/>
      </svg>
    </button>
  </nav>

  <!-- MOBILE MENU SHEET -->
  <div class="menu-sheet" id="menuSheet" aria-hidden="true">
    <a href="aromazla.html">Aromazla</a>
    <a href="https://visuanza.es" target="_blank" rel="noopener">Visuanza</a>
  </div>

  <!-- STICKY STACK on mobile · HORIZONTAL SCROLL on desktop (≥1024px).
       The .hpanels container holds the two horizontal panels (hero + doorway).
       On desktop, ScrollTrigger pins it and translates the track on the x-axis.
       After the pin releases, the footer scrolls up normally. -->
  <main class="stack">
   <div class="hpanels" id="hpanels">
    <div class="hpanels-track" id="hpanelsTrack">

  <!-- HERO -->
  <section class="hero panel hpanel" id="hero" style="--z:1;">
    <div class="hero-frame">
      <div class="hero-plate">
        <div class="hero-name" aria-label="Ivan Alzamora">

                <feComposite in="sFlood" in2="SourceAlpha" operator="out" result="sOut"/>

                <feGaussianBlur in="sOff" stdDeviation="1.2" result="sBlur"/>
                <feComposite in="sBlur" in2="SourceAlpha" operator="in" result="shadow"/>

                <feFlood id="carveLightFlood" flood-color="#FFFFFF" flood-opacity="0" result="lFlood"/>
                <feComposite in="lFlood" in2="SourceAlpha" operator="out" result="lOut"/>
                <feOffset in="lOut" dx="-1.0" dy="-1.3" result="lOff"/>
                <feGaussianBlur in="lOff" stdDeviation="0.85" result="lBlur"/>
                <feComposite in="lBlur" in2="SourceAlpha" operator="in" result="light"/>

                <feMerge>
                  <feMergeNode in="SourceGraphic"/>
                  <feMergeNode in="light"/>
                  <feMergeNode in="shadow"/>
                </feMerge>
              </filter>
            </defs>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    // ─── NAV scroll state ───
    const navEl = document.getElementById('nav');
    const onScroll = () => navEl.classList.toggle('scrolled', window.scrollY > 30);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    // ─── Pendant video source: pick the format whose alpha each browser can actually render ───
    //   Safari (macOS + iOS):  HEVC alpha .mov  — Apple's native transparent-video format
    //   Chrome / Firefox / Edge desktop:  VP9 alpha WebM
    //   Mobile non-Safari (Android Chrome small viewport):  H.264 MP4 + mix-blend-mode: lighten
    // The MP4 + blend path is also the safety fallback if the .mov fails to decode.
    const doorVideo = document.getElementById('doorVideo');
    if (doorVideo) {
      const ua = navigator.userAgent;
      // Safari (any platform). Excludes Chrome/Edge/Firefox-on-iOS which include "Safari" in UA.
      const isSafari = /^((?!chrome|chromium|crios|fxios|edgios|android).)*safari/i.test(ua);

      const mql = window.matchMedia('(min-width: 1024px)');
      let movFailed = false;
      const setDoorVideoSrc = () => {
        let next, blend;
        if (isSafari && !movFailed) {
          next = 'assets/sap.mov';   // HEVC alpha — native transparency on Safari
          blend = false;
        } else if (!isSafari && mql.matches) {
          next = 'assets/sap.webm';  // VP9 alpha — desktop Chrome/Firefox/Edge
          blend = false;
        } else {
          next = 'assets/sap.mp4';   // H.264 + black matte → lighten blend knocks it out
          blend = true;
        }
        doorVideo.classList.toggle('use-blend', blend);
        if (doorVideo.getAttribute('src') !== next) {
          doorVideo.setAttribute('src', next);
          doorVideo.load();
          doorVideo.play().catch(() => {});
        }
      };
      // If the HEVC .mov can't be decoded for whatever reason on a given Safari
      // (older iOS, missing hardware decoder), fall back to MP4 + blend automatically.
      doorVideo.addEventListener('error', () => {
        if (!movFailed && doorVideo.getAttribute('src')?.endsWith('sap.mov')) {
          movFailed = true;
          setDoorVideoSrc();
        }
      });
      setDoorVideoSrc();
      mql.addEventListener('change', setDoorVideoSrc);
    }

    // ─── Card-flip mobile nav ───
    const card = document.getElementById('navCard');
    const sheet = document.getElementById('menuSheet');
    const setOpen = (open) => {
      card.classList.toggle('open', open);
      sheet.classList.toggle('open', open);
      card.setAttribute('aria-expanded', open ? 'true' : 'false');
      sheet.setAttribute('aria-hidden', open ? 'false' : 'true');
      document.body.style.overflow = open ? 'hidden' : '';
    };
    card.addEventListener('click', () => setOpen(!card.classList.contains('open')));
    sheet.querySelectorAll('a').forEach((a) => a.addEventListener('click', () => setOpen(false)));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && card.classList.contains('open')) setOpen(false);
    });

    // ─── Reveals ───
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.reveal').forEach((el) => obs.observe(el));

    // ─── HERO: GSAP path-draw ───
    // Strategy: per <path> measure pathLength, set strokeDasharray/Offset, animate to 0 over 4s,
    // then fill-opacity 0→1 over 1.5s. The single SVG path here contains all glyphs as subpaths;
    // the browser treats getTotalLength() across the whole d, which still yields a valid draw.
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const path = document.getElementById('namePath');
    const tagline = document.querySelector('.hero-tagline');
    const heroCue = document.getElementById('heroCue');
    if (path && !reduce) {
      const len = path.getTotalLength();
      gsap.set(path, {
        strokeDasharray: len,
        strokeDashoffset: len,
        fillOpacity: 0,
        strokeOpacity: 1
      });
      const shadowFlood = document.getElementById('carveShadowFlood');
      const lightFlood = document.getElementById('carveLightFlood');

      const tl = gsap.timeline();
      // 1. Draw the stroke (same 4s pace as before).
      tl.to(path, { strokeDashoffset: 0, duration: 4, ease: 'power1.inOut' }, 0.6);
      // 2. Fill catches the draw early — starts 3.4s before the stroke completes.
      //    Stroke crossfades down across the same window so the two states dissolve into one.
      tl.to(path, { fillOpacity: 1, duration: 1.6, ease: 'sine.inOut' }, '-=3.4');
      tl.to(path, { strokeOpacity: 0, duration: 1.6, ease: 'sine.inOut' }, '<');
      if (tagline) {
        tl.to(tagline, { opacity: 1, y: 0, duration: 1.2, ease: 'sine.out' }, '<');
      }
      // Cue rises alongside the name's fill phase — they share the same beat.
      if (heroCue) {
        tl.to(heroCue, { opacity: 0.75, duration: 1.4, ease: 'sine.out' }, '<');
        tl.add(() => heroCue.classList.add('pulsing'));
      }
      // 3. Carve catches the tail of phase 2 — starts ~2.8s earlier than its previous beat
      //    so the recess feels like a domino chasing the fill. Same smoothness (sine.inOut).
      //    Floods rise + fill darkens to #A89F90 over the same 1.0s window.
      tl.to(path, { fill: '#A89F90', duration: 1.0, ease: 'sine.inOut' }, '-=2.6');
      tl.to(shadowFlood, { attr: { 'flood-opacity': 0.92 }, duration: 1.0, ease: 'sine.inOut' }, '<');
      tl.to(lightFlood, { attr: { 'flood-opacity': 0.42 }, duration: 1.0, ease: 'sine.inOut' }, '<');
    } else {
      if (path) {
        path.style.fillOpacity = 1;
        path.style.fill = '#A89F90';
      }
      const sf = document.getElementById('carveShadowFlood');
      const lf = document.getElementById('carveLightFlood');
      if (sf) sf.setAttribute('flood-opacity', '0.92');
      if (lf) lf.setAttribute('flood-opacity', '0.42');
      if (tagline) { tagline.style.opacity = 1; tagline.style.transform = 'none'; }
      if (heroCue) { heroCue.style.opacity = 0.75; }
    }

    // ─── Horizontal scroll (desktop only) ───
    // The .hpanels block contains two 100vw panels. On ≥1024px, ScrollTrigger pins
    // the wrapper and scrubs the track on the x-axis as the user scrolls vertically.
    // Once the pin distance is consumed, the pin releases and the footer scrolls
    // up normally — no jarring jump because the wrapper holds 100vh of space and
    // the pin's natural release returns control to the document flow.
    if (window.gsap && window.ScrollTrigger) {
      gsap.registerPlugin(ScrollTrigger);
      const mm = gsap.matchMedia();
      mm.add('(min-width: 1024px)', () => {
        const track = document.getElementById('hpanelsTrack');
        const wrapper = document.getElementById('hpanels');
        if (!track || !wrapper) return;
        const panels = track.querySelectorAll('.hpanel');
        const slides = panels.length;
        const distance = () => (slides - 1) * window.innerWidth;
        const tween = gsap.to(track, {
          x: () => -distance(),
          ease: 'none',
          scrollTrigger: {
            trigger: wrapper,
            start: 'top top',
            end: () => '+=' + distance(),
            pin: true,
            scrub: 0.4,
            anticipatePin: 1,
            invalidateOnRefresh: true,
          },
        });

        return () => {
          tween.scrollTrigger && tween.scrollTrigger.kill();
          tween.kill();
        };
      });
    }
  </script>
</body>
</html>
