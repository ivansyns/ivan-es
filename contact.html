  <style>
    :root {
      --ink:        #0A0A0A;
      --ink-2:      #111111;
      --ink-3:      #15140F;
      --ink-card:   #18171A;
      --bone:       #F5F0E8;
      --bone-soft:  rgba(245, 240, 232, 0.72);
      --bone-faint: rgba(245, 240, 232, 0.42);
      --bone-line:  rgba(245, 240, 232, 0.10);
      --gold:       #C9A84C;
      --gold-soft:  rgba(201, 168, 76, 0.72);

      --f-display: 'Cinzel', 'Trajan Pro', Georgia, serif;
      --f-body:    'Inter', system-ui, sans-serif;
      --f-mono:    'JetBrains Mono', ui-monospace, monospace;

      --ease-out:  cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body { overflow-x: hidden; }
    body {
      background: var(--ink);
      color: var(--bone);
      font-family: var(--f-body);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    img, svg { display: block; max-width: 100%; }
    ::selection { background: var(--gold); color: var(--ink); }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 90;
      opacity: 0.05;
      background-image: url("assets/noise.svg");
      background-size: 320px 320px;
      mix-blend-mode: screen;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 22px clamp(20px, 4vw, 48px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      transition: background 600ms var(--ease-out), backdrop-filter 600ms;
    }
    nav.scrolled { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--f-mono);
      font-size: 0.74rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bone-soft);
      padding: 6px 0;
      position: relative;
      transition: color 240ms var(--ease-out);
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: -2px;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 360ms var(--ease-out);
    }
    .nav-links a:hover { color: var(--bone); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--bone); }
    .nav-links a.active::after { transform: scaleX(1); }

    .nav-back {
      position: absolute;
      left: clamp(20px, 4vw, 48px);
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 4px;
      color: var(--gold);
      background: transparent;
      border: 0;
      transition: color 240ms var(--ease-out);
    }
    .nav-back svg {
      width: 22px;
      height: 22px;
      display: block;
      overflow: visible;
      transition: transform 360ms cubic-bezier(0.7, -0.05, 0.3, 1);
    }
    /* Sun-alchemical glyph: circle ring + centered dot. Quiet bookmark to home. */
    .nav-back svg circle {
      stroke: currentColor; stroke-width: 2; fill: none;
    }
    .nav-back svg .sun-dot { fill: currentColor; stroke: none; }
    .nav-back:hover svg { transform: scale(1.08); }

    .nav-card {
      display: none;
      width: 36px; height: 36px;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 4px;
      color: var(--gold);
    }
    .nav-card svg { display: block; width: 100%; height: 100%; overflow: visible; }
    .nav-card line {
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      transform-box: view-box;
      transform-origin: 12px 12px;
      transition: transform 420ms cubic-bezier(0.7, -0.1, 0.3, 1.1);
    }
    /* Open state → symmetric X around the icon center (12,12), arms length ~14.
       vertical  : scaleY(0.7) shortens 20→14, rotate(-45deg) puts it on TL→BR.
       horizontal: scaleX(1.17) stretches 12→14, translateY(3px) drops to center,
                   rotate(-45deg) puts it on BL→TR. */
    .nav-card.open .cx-v { transform: rotate(-45deg) scaleY(0.7); }
    .nav-card.open .cx-h { transform: rotate(-45deg) translateY(3px) scaleX(1.17); }

    .menu-sheet {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 38px;
      padding: 96px 32px 64px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 420ms var(--ease-out), transform 540ms var(--ease-out);
    }
    .menu-sheet.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .menu-sheet a {
      font-family: var(--f-display);
      font-size: clamp(1.7rem, 7vw, 2.4rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--bone);
      text-transform: uppercase;
    }
    .menu-sheet a:hover { color: var(--gold); }
    /* Brand-icon row at the bottom — no circle, just the icons themselves with their
       brand-accurate gradients. Larger than before for prominence. */
    .menu-sheet__icons {
      display: flex;
      gap: 36px;
      margin-top: 40px;
    }
    .menu-sheet__icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 240ms var(--ease-out), filter 240ms var(--ease-out);
    }
    .menu-sheet__icons a:hover {
      transform: translateY(-2px) scale(1.05);
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.45));
    }
    .menu-sheet__icons svg { width: 44px; height: 44px; }

    /* ─── LANGUAGE SWITCHER ─── */
    .lang-switcher { position: relative; display: inline-flex; align-items: center; margin-left: 24px; }
    .lang-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px; background: transparent; border: 1px solid transparent;
      cursor: pointer; color: var(--bone-soft); border-radius: 4px;
      transition: color 240ms var(--ease-out), border-color 240ms var(--ease-out);
    }
    .lang-trigger:hover { color: var(--bone); border-color: var(--bone-line); }
    .lang-flag-svg { width: 22px; height: 14px; border-radius: 1px; display: block; flex-shrink: 0; }
    .lang-arrow-svg { width: 10px; height: 6px; display: block; transition: transform 240ms var(--ease-out); }
    .lang-trigger[aria-expanded="true"] .lang-arrow-svg { transform: rotate(180deg); }
    .lang-trigger .lang-flag-en, .lang-trigger .lang-flag-es { display: none; }
    html[lang="en"] .lang-trigger .lang-flag-en,
    html[lang="es"] .lang-trigger .lang-flag-es { display: block; }
    .lang-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0;
      min-width: 150px; padding: 6px;
      background: var(--ink-card); border: 1px solid var(--bone-line);
      border-radius: 6px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; pointer-events: none; transform: translateY(-4px);
      transition: opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
      z-index: 60;
    }
    .lang-dropdown.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .lang-dropdown button {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: transparent; border: 0; cursor: pointer;
      font-family: var(--f-mono); font-size: 0.7rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--bone-soft); text-align: left; border-radius: 4px;
      transition: color 240ms var(--ease-out), background 240ms var(--ease-out);
    }
    .lang-dropdown button:hover { color: var(--bone); background: rgba(245, 240, 232, 0.04); }
    .lang-dropdown button[aria-current="true"] { color: var(--gold); }
    .menu-sheet__lang { display: flex; gap: 14px; margin-bottom: 8px; }
    .menu-sheet__lang button {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: transparent;
      border: 1px solid var(--bone-line); border-radius: 9999px;
      cursor: pointer; font-family: var(--f-mono); font-size: 0.7rem;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--bone-soft);
      transition: color 240ms var(--ease-out), border-color 240ms var(--ease-out);
    }
    .menu-sheet__lang button[aria-current="true"] { color: var(--gold); border-color: var(--gold); }

    /* ─── PAGE LAYOUT ─── */
    main.contact {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(120px, 18vh, 200px) clamp(20px, 4vw, 48px) clamp(80px, 10vh, 120px);
      background:
        radial-gradient(ellipse 60% 65% at 50% 35% in oklab, rgba(50, 42, 28, 0.55) 0%, transparent 70%),
        linear-gradient(180deg in oklab, var(--ink-2) 0%, var(--ink) 100%);
      isolation: isolate;
    }

    .contact-head {
      text-align: center;
      margin-bottom: clamp(48px, 8vh, 96px);
      max-width: 720px;
    }
    .contact-eyebrow {
      font-family: var(--f-mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .contact-eyebrow::before, .contact-eyebrow::after {
      content: '';
      display: block;
      width: 22px; height: 1px;
      background: var(--gold);
    }
    .contact-title {
      font-family: var(--f-display);
      font-size: clamp(2.4rem, 5.6vw, 4.8rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--bone);
      text-transform: uppercase;
    }
    .contact-lede {
      margin-top: 22px;
      font-family: var(--f-display);
      font-size: clamp(1.05rem, 1.4vw, 1.2rem);
      line-height: 1.65;
      color: var(--bone-soft);
      letter-spacing: 0.005em;
    }
    .contact-lede em { font-style: italic; color: var(--gold); }

    .contact-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 320px));
      gap: clamp(20px, 3vw, 40px);
      width: 100%;
      max-width: 720px;
    }
    @media (max-width: 640px) {
      .contact-cards { grid-template-columns: 1fr; }
    }

    .contact-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: clamp(32px, 5vw, 48px) clamp(24px, 4vw, 36px);
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(201, 168, 76, 0.05) 0%, transparent 70%),
        linear-gradient(160deg, var(--ink-card) 0%, var(--ink-2) 100%);
      border: 1px solid var(--bone-line);
      transition: border-color 600ms var(--ease-out),
                  transform 600ms var(--ease-out);
      text-align: center;
    }
    .contact-card:hover {
      transform: translateY(-3px);
      border-color: rgba(201, 168, 76, 0.32);
    }

    /* No circle wrapper — the brand icons carry their own colored gradients. */
    .contact-card__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 360ms var(--ease-out);
    }
    .contact-card:hover .contact-card__icon {
      transform: scale(1.08);
    }
    .contact-card__icon svg { width: 64px; height: 64px; }

    .contact-card__label {
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }
    .contact-card__handle {
      font-family: var(--f-display);
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--bone);
    }
    .contact-card__cap {
      font-family: var(--f-mono);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--bone-faint);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 900ms var(--ease-out), transform 900ms var(--ease-out);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-card { display: inline-flex; }
      .lang-switcher { display: none; }
    }

    a:focus-visible, button:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>

  <script>
    const navEl = document.getElementById('nav');
    const onScroll = () => navEl.classList.toggle('scrolled', window.scrollY > 30);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    const card = document.getElementById('navCard');
    const sheet = document.getElementById('menuSheet');
    const setOpen = (open) => {
      card.classList.toggle('open', open);
      sheet.classList.toggle('open', open);
      card.setAttribute('aria-expanded', open ? 'true' : 'false');
      sheet.setAttribute('aria-hidden', open ? 'false' : 'true');
      document.body.style.overflow = open ? 'hidden' : '';
    };
    card.addEventListener('click', () => setOpen(!card.classList.contains('open')));
    sheet.querySelectorAll('a').forEach((a) => a.addEventListener('click', () => setOpen(false)));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && card.classList.contains('open')) setOpen(false);
    });

    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.reveal').forEach((el) => obs.observe(el));
  </script>
